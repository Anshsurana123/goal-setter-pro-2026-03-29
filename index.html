<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goal Setter Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
        }
        .dashboard {
            padding: 20px;
        }
        .card {
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .card-header {
            background-color: #fff;
            border-bottom: 1px solid #ddd;
            padding: 10px;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }
        .card-body {
            padding: 20px;
        }
        .chart-container {
            height: 300px;
            width: 100%;
        }
        .habit-tracker {
            margin-bottom: 20px;
        }
        .habit-tracker .card-body {
            padding: 10px;
        }
        .habit-tracker .card-body .habit {
            margin-bottom: 10px;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        .habit-tracker .card-body .habit:last-child {
            border-bottom: none;
        }
        . habit-tracker .card-body .habit .habit-name {
            font-weight: bold;
        }
        .habit-tracker .card-body .habit .habit-counter {
            float: right;
        }
    </style>
</head>
<body>
    <div id="login-screen" style="display: block;">
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-header">
                            <h3>Login</h3>
                        </div>
                        <div class="card-body">
                            <input type="text" id="username" class="form-control" placeholder="Username">
                            <button class="btn btn-primary mt-3" onclick="login()">Login</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="dashboard" style="display: none;">
        <div class="container dashboard">
            <div class="row">
                <div class="col-md-12">
                    <h1>Goal Setter Pro</h1>
                    <p>Welcome, <span id="username-display"></span>!</p>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header">
                            <h4>Goal Setting</h4>
                        </div>
                        <div class="card-body">
                            <input type="text" id="goal-name" class="form-control" placeholder="Goal Name">
                            <textarea id="goal-description" class="form-control mt-3" placeholder="Goal Description"></textarea>
                            <button class="btn btn-primary mt-3" onclick="addGoal()">Add Goal</button>
                            <div id="goals-container" class="mt-3"></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header">
                            <h4>Habit Tracker</h4>
                        </div>
                        <div class="card-body habit-tracker">
                            <input type="text" id="habit-name" class="form-control" placeholder="Habit Name">
                            <button class="btn btn-primary mt-3" onclick="addHabit()">Add Habit</button>
                            <div id="habits-container" class="mt-3"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header">
                            <h4>Progress Analysis</h4>
                        </div>
                        <div class="card-body">
                            <div class="chart-container">
                                <canvas id="progressChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header">
                            <h4>Export and Share</h4>
                        </div>
                        <div class="card-body">
                            <button class="btn btn-primary" onclick="exportData()">Export Data</button>
                            <button class="btn btn-primary" onclick="shareData()">Share Progress</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.7.1/dist/chart.min.js"></script>
    <script>
        let goals = JSON.parse(localStorage.getItem('goals')) || [];
        let habits = JSON.parse(localStorage.getItem('habits')) || [];
        let username = localStorage.getItem('username') || '';

        function login() {
            username = document.getElementById('username').value;
            localStorage.setItem('username', username);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('username-display').innerText = username;
        }

        function addGoal() {
            let goalName = document.getElementById('goal-name').value;
            let goalDescription = document.getElementById('goal-description').value;
            goals.push({ name: goalName, description: goalDescription, progress: 0 });
            localStorage.setItem('goals', JSON.stringify(goals));
            renderGoals();
        }

        function renderGoals() {
            let goalsContainer = document.getElementById('goals-container');
            goalsContainer.innerHTML = '';
            goals.forEach((goal, index) => {
                let goalElement = document.createElement('div');
                goalElement.classList.add('card');
                goalElement.innerHTML = `
                    <div class="card-body">
                        <h5>${goal.name}</h5>
                        <p>${goal.description}</p>
                        <progress value="${goal.progress}" max="100"></progress>
                        <button class="btn btn-primary" onclick="updateGoalProgress(${index})">Update Progress</button>
                    </div>
                `;
                goalsContainer.appendChild(goalElement);
            });
        }

        function updateGoalProgress(index) {
            let progress = prompt('Enter progress (0-100):');
            goals[index].progress = parseInt(progress);
            localStorage.setItem('goals', JSON.stringify(goals));
            renderGoals();
        }

        function addHabit() {
            let habitName = document.getElementById('habit-name').value;
            habits.push({ name: habitName, counter: 0 });
            localStorage.setItem('habits', JSON.stringify(habits));
            renderHabits();
        }

        function renderHabits() {
            let habitsContainer = document.getElementById('habits-container');
            habitsContainer.innerHTML = '';
            habits.forEach((habit, index) => {
                let habitElement = document.createElement('div');
                habitElement.classList.add('habit');
                habitElement.innerHTML = `
                    <span class="habit-name">${habit.name}</span>
                    <span class="habit-counter">${habit.counter}</span>
                    <button class="btn btn-primary" onclick="incrementHabitCounter(${index})">+</button>
                `;
                habitsContainer.appendChild(habitElement);
            });
        }

        function incrementHabitCounter(index) {
            habits[index].counter++;
            localStorage.setItem('habits', JSON.stringify(habits));
            renderHabits();
        }

        function exportData() {
            let data = {
                goals: goals,
                habits: habits
            };
            let json = JSON.stringify(data);
            let blob = new Blob([json], { type: 'application/json' });
            let url = URL.createObjectURL(blob);
            let a = document.createElement('a');
            a.href = url;
            a.download = 'data.json';
            a.click();
        }

        function shareData() {
            let data = {
                goals: goals,
                habits: habits
            };
            let json = JSON.stringify(data);
            navigator.clipboard.writeText(json).then(() => {
                alert('Data copied to clipboard');
            });
        }

        function renderProgressChart() {
            let ctx = document.getElementById('progressChart').getContext('2d');
            let chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: goals.map(goal => goal.name),
                    datasets: [{
                        label: 'Progress',
                        data: goals.map(goal => goal.progress),
                        backgroundColor: 'rgba(255, 99, 132, 0.2)',
                        borderColor: 'rgba(255, 99, 132, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        if (username) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('username-display').innerText = username;
        }

        renderGoals();
        renderHabits();
        renderProgressChart();
    </script>
</body>
</html>
